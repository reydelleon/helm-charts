apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "job-search-workflow.fullname" . }}-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "job-search-workflow.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.jobSearch.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.jobSearch.persistence.size }}
