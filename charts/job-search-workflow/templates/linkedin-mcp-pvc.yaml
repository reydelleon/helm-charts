apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "job-search-workflow.fullname" . }}-linkedin-profile
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "job-search-workflow.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.linkedinMcp.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.linkedinMcp.persistence.size }}
