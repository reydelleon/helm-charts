apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "job-search-workflow.fullname" . }}-linkedin-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "job-search-workflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: linkedin-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "job-search-workflow.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: linkedin-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "job-search-workflow.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: linkedin-mcp
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ['sh', '-c', 'chown -R 1000:1000 /home/pwuser/.linkedin-mcp']
          volumeMounts:
            - name: linkedin-profile
              mountPath: /home/pwuser/.linkedin-mcp
      containers:
        - name: linkedin-mcp
          image: "{{ .Values.linkedinMcp.image.repository }}:{{ .Values.linkedinMcp.image.tag }}"
          args:
            - "--transport"
            - "streamable-http"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            - "--slow-mo"
            - "500"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "500m"
          volumeMounts:
            - name: linkedin-profile
              mountPath: /home/pwuser/.linkedin-mcp
      volumes:
        - name: linkedin-profile
          persistentVolumeClaim:
            claimName: {{ include "job-search-workflow.fullname" . }}-linkedin-profile
