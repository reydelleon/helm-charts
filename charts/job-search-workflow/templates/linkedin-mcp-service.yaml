apiVersion: v1
kind: Service
metadata:
  name: {{ include "job-search-workflow.fullname" . }}-linkedin-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "job-search-workflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: linkedin-mcp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "job-search-workflow.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: linkedin-mcp
  ports:
    - name: http
      port: 8080
      targetPort: http
